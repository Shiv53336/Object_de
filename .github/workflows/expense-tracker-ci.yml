name: Expense Tracker — Build & Release

on:
  push:
    branches:
      - main
      - master
      - "claude/**"
    paths:
      - "expense-tracker/**"
      - "expense-tracker-rn/**"
      - ".github/workflows/expense-tracker-ci.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "expense-tracker/**"
      - "expense-tracker-rn/**"
      - ".github/workflows/expense-tracker-ci.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  # ── Web build ─────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expense-tracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Zip build output
        run: |
          cd dist
          zip -r ../expense-tracker-build.zip .
          cd ..
          echo "Build zipped: $(du -sh expense-tracker-build.zip | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-web-build
          path: expense-tracker/expense-tracker-build.zip
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Expense Tracker Web Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/* 2>/dev/null | while read size file; do
            echo "| \`$(basename $file)\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Artifact:** \`expense-tracker-web-build\` (retained 30 days)" >> $GITHUB_STEP_SUMMARY

  # ── Android APK build ─────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expense-tracker-rn/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        working-directory: expense-tracker-rn
        run: npm ci --legacy-peer-deps

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('expense-tracker-rn/package-lock.json') }}
          restore-keys: gradle-

      - name: Expo prebuild — generate Android native project
        working-directory: expense-tracker-rn
        run: npx expo prebuild --platform android --non-interactive

      - name: Make Gradle wrapper executable
        working-directory: expense-tracker-rn/android
        run: chmod +x gradlew

      - name: Build debug APK with bundled JS (arm64-v8a only for speed)
        working-directory: expense-tracker-rn/android
        run: ./gradlew assembleDebug --no-daemon -Pandroid.injected.abis=arm64-v8a -PbundleInDebug=true

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp expense-tracker-rn/android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/money-journal-debug.apk
          echo "APK size: $(du -sh apk-output/money-journal-debug.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: money-journal-android-debug
          path: apk-output/money-journal-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Money Journal — Android APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh apk-output/money-journal-debug.apk | cut -f1)
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | \`money-journal-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | Debug (sideloadable) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to install" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`money-journal-debug.apk\` from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Transfer to your Android device" >> $GITHUB_STEP_SUMMARY
          echo "3. Enable **Install from unknown sources** in Settings" >> $GITHUB_STEP_SUMMARY
          echo "4. Tap the APK file to install" >> $GITHUB_STEP_SUMMARY

  # ── Release job: only on push to main/master ──────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-web-build
          path: ./release-assets

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: money-journal-android-debug
          path: ./release-assets

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Money Journal — ${{ steps.tag.outputs.tag }}"
          body: |
            ## Money Journal Release

            ### 📱 Android APK (`money-journal-debug.apk`)
            1. Download and transfer to your Android phone
            2. Enable **Settings → Install from unknown sources**
            3. Tap the APK to install

            ### 🌐 Web Build (`expense-tracker-build.zip`)
            Unzip and serve with any static server:
            ```bash
            npx serve .
            ```

            > Debug build — works on any Android device without Play Store.
          files: |
            ./release-assets/money-journal-debug.apk
            ./release-assets/expense-tracker-build.zip
          draft: false
          prerelease: false
