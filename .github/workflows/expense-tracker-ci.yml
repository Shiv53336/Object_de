name: Expense Tracker — Build & Release

on:
  push:
    branches:
      - main
      - master
      - "claude/**"
    paths:
      - "expense-tracker/**"
      - ".github/workflows/expense-tracker-ci.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "expense-tracker/**"
      - ".github/workflows/expense-tracker-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: expense-tracker

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-dist
          path: expense-tracker/dist
          retention-days: 1

      - name: Zip build output
        run: |
          cd dist
          zip -r ../expense-tracker-build.zip .
          echo "Build zipped: $(du -sh ../expense-tracker-build.zip | cut -f1)"

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-web-build
          path: expense-tracker/expense-tracker-build.zip
          retention-days: 30

  apk:
    name: Build Android APK
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-dist
          path: expense-tracker/dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: expense-tracker/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-debug-apk
          path: expense-tracker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK summary
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## Expense Tracker APK" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | Debug (unsigned) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    needs: apk
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-web-build
          path: ./release-assets

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-debug-apk
          path: ./release-assets

      - name: Generate release tag
        id: tag
        run: echo "tag=expense-tracker-v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Expense Tracker — ${{ steps.tag.outputs.tag }}"
          body: |
            ## Expense Tracker Release

            ### Downloads
            | File | Description |
            |------|-------------|
            | `app-debug.apk` | Android APK — install directly on your phone |
            | `expense-tracker-build.zip` | Web build — deploy anywhere |

            ### Install APK on Android
            1. Download `app-debug.apk`
            2. On your phone: **Settings → Install unknown apps** → allow your browser/file manager
            3. Open the downloaded APK and tap **Install**
          files: |
            ./release-assets/expense-tracker-build.zip
            ./release-assets/app-debug.apk
          draft: false
          prerelease: false
